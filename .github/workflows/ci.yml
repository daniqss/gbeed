name: CI

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-25.11
          
      - name: Clone Blargg's ROM test suite
        run: |
          git clone https://github.com/retrio/gb-test-roms.git

      - name: Download Mooneye test suite
        run: |
          wget https://gekkio.fi/files/mooneye-test-suite/mts-20240926-1737-443f6e1/mts-20240926-1737-443f6e1.tar.xz
          tar -xJf mts-20240926-1737-443f6e1.tar.xz

      - name: Download open source DMG Boot ROM
        run: |
          wget https://github.com/alloncm/MagenBoot/releases/download/0.2.0/dmg_boot.bin -O dmg_boot.bin

      - name: Run tests
        run: |
          nix develop .#x11 --command -- just test