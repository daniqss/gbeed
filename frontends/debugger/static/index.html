<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>gbeed</title>
    <style>
      body {
        margin: 0;
        background: #222;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }
      canvas {
        width: 100vw;
        height: 100vh;
        max-width: 1920px;
        max-height: 1080px;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <script type="text/javascript">
      var Module = {
        canvas: document.getElementById("canvas"),
        onRuntimeInitialized: () => {
          window.addEventListener("beforeunload", () => {
            if (Module._save_game_wasm) {
              Module._save_game_wasm();
            }
          });

          window.addEventListener("pagehide", () => {
            if (Module._save_game_wasm) Module._save_game_wasm();
          });

          document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "hidden" && Module._save_game_wasm)
              Module._save_game_wasm();
          });

          // periodic save just in case, but local storage based saves should work fine
          setInterval(function () {
            if (Module._save_game_wasm) Module._save_game_wasm();
          }, 30000);
        },
      };
    </script>
    <script src="gbeed.js"></script>
  </body>
</html>
